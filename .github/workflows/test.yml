name: test

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          curl -sSfL "https://github.com/rhysd/actionlint/releases/download/v1.7.11/actionlint_1.7.11_linux_amd64.tar.gz" \
            | tar -xz actionlint
          sudo mv actionlint /usr/local/bin/
      - name: Run actionlint
        run: actionlint

      - name: shellcheck
        run: |
          find bin -type f -exec shellcheck --shell=bash {} +
          shellcheck lib/*.sh hooks/*.sh

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run gitleaks
        run: gitleaks detect --source . --no-banner

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq socat

      - name: Install bats
        run: |
          git clone --depth 1 --branch v1.13.0 https://github.com/bats-core/bats-core.git /tmp/bats
          sudo /tmp/bats/install.sh /usr/local

      - name: Run tests
        run: bats --recursive tests/

      - name: Generate app token
        if: github.event_name == 'push'
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.DISPATCHER_APP_ID }}
          private-key: ${{ secrets.DISPATCHER_PRIVATE_KEY }}
          repositories: buildinglanekeep

      - name: Trigger meta-repo E2E
        if: github.event_name == 'push'
        env:
          TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/algorismo-au/buildinglanekeep/dispatches \
            -d '{"event_type":"lanekeep-release"}'
