name: test

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: actionlint
        uses: rhysd/action-actionlint@v1

      - name: shellcheck
        run: |
          find bin -type f | xargs shellcheck --shell=bash
          shellcheck lib/*.sh hooks/*.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq socat

      - name: Install bats
        run: |
          git clone https://github.com/bats-core/bats-core.git /tmp/bats
          sudo /tmp/bats/install.sh /usr/local

      - name: Run tests
        run: bats --recursive tests/

      - name: Generate app token
        if: github.event_name == 'push'
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DISPATCHER_APP_ID }}
          private-key: ${{ secrets.DISPATCHER_PRIVATE_KEY }}
          repositories: buildinglanekeep

      - name: Trigger meta-repo E2E
        if: github.event_name == 'push'
        env:
          TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/algorismo-au/buildinglanekeep/dispatches \
            -d '{"event_type":"lanekeep-release"}'
